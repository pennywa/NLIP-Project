<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Angel Filter</title>
<script src="/static/plotly.min.js"></script>
<style>
  :root {
    --bg: #0f1420; --card: #1a2032; --ink: #e8ecf5; --muted: #93a0b8;
    --accent: #6aa9ff; --warn: #ffb36a; --good: #7dd87a; --border: #2a3450;
    --best-border: #6aa9ff44;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--ink); }
  main { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
  h1 { margin: 0 0 4px; font-size: 28px; letter-spacing: -0.02em; }
  .sub { color: var(--muted); margin-bottom: 28px; }
  form { display: grid; gap: 10px; margin-bottom: 24px; }
  input { font: inherit; color: var(--ink); background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; width: 100%; }
  input:focus { outline: 2px solid var(--accent); }
  button.primary { font: inherit; color: #081020; background: var(--accent); border: none; border-radius: 10px; font-weight: 600; cursor: pointer; padding: 12px 18px; }
  button.primary:hover { filter: brightness(1.1); }
  button.primary:disabled { opacity: 0.5; cursor: wait; }
  .label { color: var(--muted); font-size: 13px; margin-bottom: -4px; }
  .meta { color: var(--muted); font-size: 13px; margin: 16px 0 10px; }
  .intent-badge { display: inline-block; background: #1e2d50; color: var(--accent); font-size: 12px; font-weight: 600; padding: 2px 10px; border-radius: 999px; margin-left: 8px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Best answer card */
  .best-card { background: var(--card); border: 1px solid var(--best-border); border-radius: 14px; padding: 20px 22px; margin-bottom: 16px; position: relative; }
  .best-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .best-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .best-snippet { color: var(--muted); font-size: 14px; margin-bottom: 10px; }
  .consensus-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 12px; color: var(--muted); }
  .consensus-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--good); }
  .axis-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .axis-chip { font-size: 12px; background: #202840; border-radius: 8px; padding: 4px 10px; }
  .axis-chip span { color: var(--accent); font-weight: 600; }

  /* Other results */
  .toggle-btn { background: none; border: 1px solid var(--border); color: var(--muted); font: inherit; font-size: 13px; border-radius: 8px; padding: 6px 14px; cursor: pointer; margin-bottom: 12px; }
  .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
  .others { display: none; }
  .others.open { display: block; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 8px; }
  .rank { display: inline-block; background: #2a3450; color: var(--accent); font-weight: 700; padding: 2px 9px; border-radius: 999px; margin-right: 8px; font-size: 13px; }
  .card-title { font-weight: 600; }
  .snippet { color: var(--muted); margin-top: 5px; font-size: 14px; }
  .row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; font-size: 12px; }
  .chip { background: #202840; color: var(--muted); border-radius: 999px; padding: 3px 10px; }
  .chip.sponsored { background: #3a2a1a; color: var(--warn); }
  .chip.good { background: #1a3a22; color: var(--good); }
  .chip.agreed { background: #1a2e3a; color: #6ad4ff; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .error { color: var(--warn); }

  /* 3D Plot */
  .plot-section { margin-top: 32px; }
  .plot-title { font-size: 14px; font-weight: 600; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
  #plot { width: 100%; height: 480px; border-radius: 14px; overflow: hidden; background: var(--card); border: 1px solid var(--border); }
</style>
</head>
<body>
<main>
  <h1>Angel Filter</h1>
  <p class="sub">Asks multiple AI providers, finds what they agree on, ranks by what <em>you</em> care about.</p>

  <form id="f">
    <span class="label">What are you looking for?</span>
    <input id="q" placeholder='e.g. "find three top lunch spots, budget $15"' required />
    <span class="label">What matters most to you? (optional)</span>
    <input id="p" placeholder='e.g. "low price" or "closest to me" or "highest rated"' />
    <button id="go" class="primary" type="submit">Ask Angel Filter</button>
  </form>

  <div id="out"></div>
  <div id="plot-wrap" style="display:none" class="plot-section">
    <div class="plot-title">3D Scoring Space — Price · Distance · Rating</div>
    <div id="plot"></div>
  </div>
</main>

<script>
const form = document.getElementById("f");
const out  = document.getElementById("out");
const btn  = document.getElementById("go");
const plotWrap = document.getElementById("plot-wrap");

const PROVIDER_COLORS = {
  gemini:     "#0f766e",
  ollama:     "#b45309",
  openai:     "#10a37f",
  watsonx:    "#0f62fe",
  duckduckgo: "#2563eb",
  brave:      "#e05c2a",
  mock:       "#7c3aed",
};

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const query      = document.getElementById("q").value.trim();
  const preference = document.getElementById("p").value.trim() || null;
  if (!query) return;

  btn.disabled = true;
  plotWrap.style.display = "none";
  out.innerHTML = `<div class="meta">Querying providers…</div>`;

  try {
    const res = await fetch("/query", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ query, preference }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    render(data);
    if ((data.results || []).length > 0) {
      renderPlot(data.results);
      plotWrap.style.display = "block";
    }
  } catch (err) {
    out.innerHTML = `<div class="card error">Request failed: ${esc(err.message)}</div>`;
  } finally {
    btn.disabled = false;
  }
});

function render(data) {
  const results = data.results || [];
  const used    = (data.providers_used || []).join(", ") || "none";
  const failed  = (data.providers_failed || []).join(", ");
  const intent  = data.intent || "general";

  let html = `<div class="meta">
    Providers: ${esc(used)}${failed ? " · failed: " + esc(failed) : ""}
    <span class="intent-badge">${esc(intent)}</span>
  </div>`;

  if (!results.length) {
    html += `<div class="card">No results returned.</div>`;
    out.innerHTML = html;
    return;
  }

  // --- Best answer ---
  const best = results[0];
  const axes = best.axis_scores || {};
  const axisHtml = Object.entries(axes).map(([k, v]) =>
    `<div class="axis-chip">${esc(k.replace("_", " "))}: <span>${v}</span></div>`
  ).join("");

  html += `<div class="best-card">
    <div class="best-label">Angel Filter's best answer</div>
    <div class="best-title">${esc(best.title)}</div>
    <div class="best-snippet">${esc(best.snippet || "")}</div>
    ${best.url ? `<div class="best-snippet"><a href="${esc(best.url)}" target="_blank" rel="noopener">${esc(best.url)}</a></div>` : ""}
    ${(best.consensus_count || 0) > 1
      ? `<div class="consensus-bar"><div class="consensus-dot"></div>${esc(String(best.consensus_count))} providers agreed on this answer</div>`
      : ""}
    <div class="axis-row">${axisHtml}</div>
    <div class="row">
      <span class="chip">score ${best.score}</span>
      <span class="chip">${esc(best.provider)}</span>
      ${best.sponsored
        ? `<span class="chip sponsored">sponsored · penalized</span>`
        : `<span class="chip good">organic</span>`}
      ${(best.consensus_count || 0) > 1
        ? `<span class="chip agreed">${esc(String(best.consensus_count))} agreed</span>`
        : ""}
    </div>
    <div class="snippet" style="margin-top:8px"><em>${esc(best.rationale || "")}</em></div>
  </div>`;

  if (results.length > 1) {
    html += `<button class="toggle-btn" onclick="toggleOthers(this)">
      Show other responses (${results.length - 1})
    </button>
    <div class="others" id="others">`;

    results.slice(1).forEach((r, i) => {
      html += `<div class="card">
        <span class="rank">#${i + 2}</span><span class="card-title">${esc(r.title)}</span>
        <div class="snippet">${esc(r.snippet || "")}</div>
        ${r.url ? `<div class="snippet"><a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.url)}</a></div>` : ""}
        <div class="row">
          <span class="chip">score ${r.score}</span>
          <span class="chip">${esc(r.provider)}</span>
          ${r.sponsored
            ? `<span class="chip sponsored">sponsored · penalized</span>`
            : `<span class="chip good">organic</span>`}
          ${(r.consensus_count || 0) > 1
            ? `<span class="chip agreed">${esc(String(r.consensus_count))} agreed</span>`
            : ""}
        </div>
        <div class="snippet"><em>${esc(r.rationale || "")}</em></div>
      </div>`;
    });

    html += `</div>`;
  }

  out.innerHTML = html;
}

// --- 3D Plot -----------------------------------------------------------
// Each result has axis_scores: { P1_price, P2_distance, P3_rating } (0-1).
// We map those directly to X/Y/Z so the best result sits in the
// high-score corner and the worst in the low corner.

function renderPlot(results) {
  const winnerTitle = results[0].title;

  const xs = results.map(r => (r.axis_scores || {}).P1_price    || 0.5);
  const ys = results.map(r => (r.axis_scores || {}).P2_distance || 0.5);
  const zs = results.map(r => (r.axis_scores || {}).P3_rating   || 0.5);
  const labels = results.map((r, i) =>
    r.title === winnerTitle ? `Winner: ${r.title}` : `#${i + 1}: ${r.title}`
  );
  const colors = results.map(r =>
    r.title === winnerTitle ? "#dc2626" : (PROVIDER_COLORS[r.provider] || "#6aa9ff")
  );
  const sizes = results.map(r => r.title === winnerTitle ? 14 : 9);
  const symbols = results.map(r => r.title === winnerTitle ? "diamond" : "circle");

  // Lines from origin to each point
  const lineTraces = results.map((r, i) => ({
    x: [0, xs[i]], y: [0, ys[i]], z: [0, zs[i]],
    mode: "lines", type: "scatter3d",
    line: {
      color: colors[i],
      width: r.title === winnerTitle ? 6 : 3,
      dash:  r.title === winnerTitle ? "solid" : "dot",
    },
    opacity: r.title === winnerTitle ? 0.9 : 0.4,
    hoverinfo: "skip", showlegend: false,
  }));

  // Result points
  const pointTrace = {
    x: xs, y: ys, z: zs,
    text: labels,
    mode: "markers+text",
    type: "scatter3d",
    textposition: "top center",
    textfont: { size: 10, color: "#e8ecf5" },
    customdata: results.map(r => [
      r.title, r.provider, r.score,
      (r.axis_scores || {}).P1_price    || "—",
      (r.axis_scores || {}).P2_distance || "—",
      (r.axis_scores || {}).P3_rating   || "—",
      r.sponsored ? "sponsored" : "organic",
    ]),
    hovertemplate:
      "<b>%{customdata[0]}</b><br>" +
      "Provider: %{customdata[1]}<br>" +
      "Score: %{customdata[2]}<br>" +
      "P1 price: %{customdata[3]}<br>" +
      "P2 distance: %{customdata[4]}<br>" +
      "P3 rating: %{customdata[5]}<br>" +
      "%{customdata[6]}<extra></extra>",
    marker: { size: sizes, color: colors, symbol: symbols, opacity: 0.95, line: { color: "#ffffff", width: 1.2 } },
    showlegend: false,
  };

  // Origin marker
  const originTrace = {
    x: [0], y: [0], z: [0],
    text: ["Query origin"],
    mode: "markers+text", type: "scatter3d",
    textposition: "bottom center",
    textfont: { size: 11, color: "#93a0b8" },
    marker: { size: 10, color: "#1b1d1f", symbol: "diamond" },
    hovertemplate: "<b>Query origin (0,0,0)</b><extra></extra>",
    showlegend: false,
  };

  // Legend entries for providers actually present
  const seenProviders = [...new Set(results.map(r => r.provider))];
  const legendTraces = [
    ...seenProviders.map(p => ({
      x: [null], y: [null], z: [null], mode: "markers", type: "scatter3d",
      marker: { size: 8, color: PROVIDER_COLORS[p] || "#6aa9ff" },
      name: p, hoverinfo: "skip", showlegend: true,
    })),
    { x: [null], y: [null], z: [null], mode: "markers", type: "scatter3d",
      marker: { size: 8, color: "#dc2626" }, name: "Winner", hoverinfo: "skip", showlegend: true },
  ];

  Plotly.newPlot("plot", [...lineTraces, pointTrace, originTrace, ...legendTraces], {
    margin: { l: 0, r: 0, b: 0, t: 32 },
    paper_bgcolor: "rgba(0,0,0,0)",
    plot_bgcolor:  "rgba(0,0,0,0)",
    font: { color: "#93a0b8" },
    scene: {
      xaxis: { title: "P1 Price score",    backgroundcolor: "rgba(255,255,255,0.04)", gridcolor: "rgba(255,255,255,0.08)", zerolinecolor: "rgba(255,255,255,0.2)", range: [0, 1] },
      yaxis: { title: "P2 Distance score", backgroundcolor: "rgba(255,255,255,0.04)", gridcolor: "rgba(255,255,255,0.08)", zerolinecolor: "rgba(255,255,255,0.2)", range: [0, 1] },
      zaxis: { title: "P3 Rating score",   backgroundcolor: "rgba(255,255,255,0.04)", gridcolor: "rgba(255,255,255,0.08)", zerolinecolor: "rgba(255,255,255,0.2)", range: [0, 1] },
      camera: { eye: { x: 1.6, y: 1.4, z: 1.2 } },
      aspectmode: "cube",
    },
    legend: {
      orientation: "h", x: 0, y: 1, yanchor: "top", xanchor: "left",
      bgcolor: "rgba(26,32,50,0.85)", bordercolor: "rgba(255,255,255,0.1)", borderwidth: 1,
    },
    showlegend: true,
  }, { responsive: true, displayModeBar: false });
}

function toggleOthers(btn) {
  const el = document.getElementById("others");
  const open = el.classList.toggle("open");
  const count = el.querySelectorAll(".card").length;
  btn.textContent = open
    ? `Hide other responses (${count})`
    : `Show other responses (${count})`;
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])
  );
}
</script>
</body>
</html>
