// --- Auto-rotate the 3D plot for 4 seconds on load --------------------
function autoRotate() {
  const el = document.getElementById("plot-3d");
  if (!el._layout) return;
  let angle = 0;
  const steps = 80;
  const id = setInterval(() => {
    angle += (2 * Math.PI) / steps;
    Plotly.relayout("plot-3d", {
      "scene.camera.eye": {
        x: 1.6 * Math.cos(angle),
        y: 1.6 * Math.sin(angle),
        z: 1.2,
      },
    });
    if (++el._rotateStep >= steps) clearInterval(id);
  }, 50);
  el._rotateStep = 0;
}

    const vals = keys.map(k => (r.axis_scores || {})[k] || 0);
    vals.push(vals[0]); // close the polygon
    const color = i === 0 ? "#dc2626" : (PROVIDER_COLORS[r.provider] || "#6aa9ff");
    return {
      type: "scatterpolar",
      r: vals,
      theta: [...axes, axes[0]],
      fill: "toself",
      fillcolor: color + "30",
      line: { color, width: 2 },
      name: r.title.length > 20 ? r.title.slice(0, 18) + "…" : r.title,
      hovertemplate: `<b>${esc(r.title)}</b><br>%{theta}: %{r:.2f}<extra></extra>`,
    };
  });

  Plotly.newPlot("plot-radar", traces, {
    polar: {
      bgcolor: "rgba(0,0,0,0)",
      radialaxis: { visible: true, range: [0, 1], color: "#93a0b8", gridcolor: "rgba(255,255,255,0.08)" },
      angularaxis: { color: "#93a0b8", gridcolor: "rgba(255,255,255,0.08)" },
    },
    paper_bgcolor: "rgba(0,0,0,0)",
    plot_bgcolor:  "rgba(0,0,0,0)",
    font: { color: "#93a0b8" },
    legend: { x: 0.5, y: -0.1, xanchor: "center", orientation: "h", bgcolor: "rgba(26,32,50,0.9)" },
    margin: { l: 60, r: 60, t: 40, b: 60 },
    showlegend: true,
  }, { responsive: true, displayModeBar: false });
}

// --- Query history ----------------------------------------------------
async function toggleHistory() {
  const dropdown = document.getElementById("history-dropdown");
  if (dropdown.classList.contains("open")) {
    dropdown.classList.remove("open");
    return;
  }
  try {
    const res = await fetch("/history");
    const data = await res.json();
    const queries = data.queries || [];
    if (!queries.length) {
      dropdown.innerHTML = `<div class="history-item"><span class="history-item-text" style="color:var(--muted)">No recent queries yet</span></div>`;
    } else {
      dropdown.innerHTML = queries.map(q =>
        `<div class="history-item" onclick="loadHistory(${JSON.stringify(esc(q))})">
          <span class="history-item-text">${esc(q)}</span>
          <span class="history-cache-badge">cached</span>
        </div>`
      ).join("");
    }
    dropdown.classList.add("open");
  } catch (e) {
    console.error("History fetch failed", e);
  }
}

function loadHistory(query) {
  document.getElementById("q").value = query;
  document.getElementById("history-dropdown").classList.remove("open");
  document.getElementById("f").requestSubmit();
}

// Close history dropdown when clicking outside
document.addEventListener("click", (e) => {
  if (!e.target.closest(".history-wrap") && !e.target.closest(".toggle-btn")) {
    document.getElementById("history-dropdown").classList.remove("open");
  }
});

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])
  );
}
